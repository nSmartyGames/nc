<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Initiation List</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;color:#d4a017;font-family:system-ui,-apple-system,sans-serif;padding:16px;min-height:100vh}
.nav-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.nav-btn{background:#2a2a2a;color:#d4a017;border:1px solid #444;border-radius:6px;padding:5px 13px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit}
.nav-btn:hover{border-color:#d4a017;background:#333}
.nav-btn.nb-logout{color:#e07070;border-color:#6a2a2a}
.nav-btn.nb-logout:hover{background:#3a1e1e;border-color:#e07070}
.nav-btn.nb-copy{color:#7ec850;border-color:#4a7a2a}
.nav-btn.nb-copy:hover{background:#1e3a1e;border-color:#7ec850}
#sy{font-size:14px;color:#888;margin-left:auto}
h1{font-size:20px;font-weight:700;color:#f0c030;margin-bottom:12px}
.part-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pbt{background:#2a2a2a;color:#d4a017;border:1px solid #444;border-radius:7px;padding:5px 14px;font-size:15px;cursor:pointer;font-weight:500}
.pbt:hover{border-color:#d4a017}
.pbt.on{background:#3a2e00;border-color:#d4a017;color:#f0c030}
.pcount{font-size:12px;color:#888;margin-left:4px}
.add-row{margin-bottom:10px}
.add-row-top{display:flex;justify-content:flex-end}
.add-form{display:none;margin-top:8px;gap:8px;align-items:center;flex-wrap:wrap}
.fi{background:#1a1a1a;border:1px solid #333;border-radius:5px;color:#d4a017;font-size:14px;padding:4px 8px;outline:none;font-family:inherit}
.fi:focus{border-color:#7a5c00}
.fi::placeholder{color:#444}
.abtn{background:#2a2a2a;color:#d4a017;border:1px solid #555;border-radius:6px;padding:5px 14px;font-size:15px;cursor:pointer;font-family:inherit}
.abtn:hover{border-color:#d4a017}
.fi-wrap{position:relative;display:inline-flex;align-items:center;flex:1;min-width:0}
.fi-wrap .fi{width:100%;padding-right:22px}
.clrx{position:absolute;right:5px;background:none;border:none;color:#666;cursor:pointer;font-size:13px;padding:0;line-height:1;font-weight:bold}
.clrx:hover{color:#d4a017}
select.fi{cursor:pointer}
.tw{overflow-x:auto;border-radius:8px;border:1px solid #333}
table{border-collapse:collapse;width:100%;table-layout:fixed}
col.cn{width:28%}col.ce{width:38%}col.cp{width:16%}col.cdel{width:10%}
thead tr.hr th{background:#d4a017;padding:8px 12px;border-bottom:1px solid #b87800;border-right:1px solid #c8900a;font-size:17px;font-weight:500;color:#fff;white-space:nowrap;user-select:none}
thead tr.hr th:last-child{border-right:none}
thead tr.fr th{background:#111;padding:5px 8px;border-right:1px solid #2a2a2a}
thead tr.fr th:last-child{border-right:none}
tbody tr:nth-child(even){background:#222}tbody tr{background:#1e1e1e}
tbody tr:hover{background:#272318}
td{font-size:15px;color:#d4a017;padding:7px 12px;border-bottom:1px solid #2a2a2a;border-right:1px solid #2a2a2a;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td:last-child{border-right:none}
td.tc{text-align:center;padding:4px}
.delbtn{background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:0 4px}
.delbtn:hover{color:#e07070}
.dupbtn{background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:0 4px}
.dupbtn:hover{color:#7ec850}
tfoot td{background:#111;border-top:2px solid #5a4000;padding:5px 12px;font-size:12px;color:#7a5c00;font-weight:600}
.norows{text-align:center;padding:24px;color:#555;font-size:12px}
td.no-email{color:#555;font-style:italic}
tbody tr.row-eligible{background:#0f2a0f!important}tbody tr.row-eligible:hover{background:#163216!important}
tbody tr.row-eligible td{color:#7ec850}
tbody tr.row-ineligible{background:#3a1010!important}tbody tr.row-ineligible:hover{background:#4a1818!important}
tbody tr.row-ineligible td{color:#e07070}
</style>
</head>
<body>

<div class="nav-bar">
  <button type="button" class="nav-btn nb-logout" onclick="adminLogout()">Logout</button>
  <button type="button" class="nav-btn" onclick="location.href='yoga.html'">← Admin</button>
  <button type="button" class="nav-btn nb-copy" onclick="copyAllEmails()">Copy Emails</button>
  <button type="button" class="nav-btn nb-copy" onclick="copyGreenEmails()">Copy Green Emails</button>
  <span id="sy"></span>
</div>

<h1>AMRITA SHAKTIPATA 9 iulie 18:00, Bucuresti</h1>

<div class="part-bar" id="partBar">
  <button class="pbt on" onclick="setPart('All')">All</button>
  <button class="pbt" onclick="setPart('Part 1')">Part 1</button>
  <button class="pbt" onclick="setPart('Iasi')">Iasi</button>
  <button class="pbt" onclick="setPart('Part 2')">Part 2</button>
  <button class="pbt" onclick="setPart('Cluj')">Cluj</button>
  <span id="bkCount" class="pcount" style="color:#7ec850;font-weight:600"></span>
</div>

<div class="add-row">
  <div class="add-row-top">
    <button type="button" class="abtn" onclick="toggleAddForm()">+ Add subscriber</button>
  </div>
  <div id="addForm" class="add-form">
    <input id="afName"  class="fi" placeholder="Name"  style="width:180px">
    <input id="afEmail" class="fi" placeholder="Email" style="width:220px">
    <button class="abtn" onclick="saveAdd()">Save</button>
    <button class="abtn" onclick="cancelAdd()" style="opacity:.7">Cancel</button>
  </div>
</div>

<div class="tw">
<table>
  <colgroup><col class="cn"><col class="ce"><col class="cp"><col class="cdel"></colgroup>
  <thead>
    <tr class="hr">
      <th>Name</th>
      <th>Email</th>
      <th>Part</th>
      <th></th>
    </tr>
    <tr class="fr">
      <th><div class="fi-wrap"><input class="fi" id="fN" placeholder="Name…" oninput="render()"><button class="clrx" onclick="clr('fN')" title="Clear">×</button></div></th>
      <th><div class="fi-wrap"><input class="fi" id="fE" placeholder="Email…" oninput="render()"><button class="clrx" onclick="clr('fE')" title="Clear">×</button></div></th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tb"><tr><td colspan="4" class="norows">Loading…</td></tr></tbody>
  <tfoot><tr><td colspan="4" id="totLabel"></td></tr></tfoot>
</table>
</div>

<script>
if (!sessionStorage.getItem('adminAuth')) {
  window.location.href = /^\/app(\/|$)/.test(location.pathname) ? '/app/' : '/';
}

var PROXY = /^\/app(\/|$)/.test(location.pathname)
  ? location.origin + '/app/airtable-proxy.php'
  : location.origin + '/airtable-proxy.php';

var rows = [];
var activePart = 'All';
var emailSets = {}, nameSets = {};

function buildEmailSets() {
  var PARTS = ['Part 1', 'Part 2', 'Iasi', 'Cluj'];
  emailSets = {}; nameSets = {};
  PARTS.forEach(function(p) { emailSets[p] = new Set(); nameSets[p] = new Set(); });
  rows.forEach(function(r) {
    var e = (r.email || '').toLowerCase().trim();
    var n = (r.name  || '').toLowerCase().trim();
    if (emailSets[r.part]) {
      if (e) emailSets[r.part].add(e);
      if (n) nameSets[r.part].add(n);
    }
  });
}

function checkEligibility(email, name) {
  var e = (email || '').toLowerCase().trim();
  var n = (name  || '').toLowerCase().trim();
  if (!e && !n) return { eligible: null, reason: 'no email or name' };
  function has(part) {
    return (e && emailSets[part] && emailSets[part].has(e)) ||
           (n && nameSets[part]  && nameSets[part].has(n));
  }
  var p1 = has('Part 1'), p2 = has('Part 2');
  var ia = has('Iasi'),   cl = has('Cluj');
  if (!p1 && !p2) return { eligible: false, reason: 'nici o aprof.' };
  if (p1 && p2) {
    if (ia && cl) return { eligible: false, reason: 'both initiations done' };
    var r12 = (!ia && !cl) ? '0 impuls.' : '1 impuls.';
    return { eligible: true, reason: 'Part 1+2 ✓ · ' + r12 };
  }
  if (ia || cl) return { eligible: false, reason: 'lipseste aprof.' };
  return { eligible: true, reason: (p1 ? 'Part 1' : 'Part 2') + ' ✓ · 0 impuls.' };
}

function sy(m) { document.getElementById('sy').textContent = m; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clr(id) { var e=document.getElementById(id); if(e){e.value='';render();e.focus();} }

function setPart(p) {
  activePart = p;
  document.querySelectorAll('.pbt').forEach(function(b) {
    b.classList.toggle('on', b.textContent.trim() === p || (p === 'All' && b.textContent.trim() === 'All'));
  });
  render();
}

function visible() {
  var fn = (document.getElementById('fN')||{}).value||'';
  var fe = (document.getElementById('fE')||{}).value||'';
  fn = fn.toLowerCase(); fe = fe.toLowerCase();
  return rows.filter(function(r, i) {
    r._idx = i;
    if (activePart !== 'All' && r.part !== activePart) return false;
    if (fn && r.name.toLowerCase().indexOf(fn) < 0) return false;
    if (fe && r.email.toLowerCase().indexOf(fe) < 0) return false;
    return true;
  });
}

function updateGreenCount() {
  var el = document.getElementById('bkCount');
  if (!el) return;
  var n = rows.filter(function(r) {
    return r.part === 'Bucuresti' && checkEligibility(r.email, r.name).eligible === true;
  }).length;
  el.textContent = n + ' green (Bucuresti)';
}

function render() {
  updateGreenCount();
  var v = visible();
  var tb = document.getElementById('tb');
  var tot = document.getElementById('totLabel');
  var withEmail = v.filter(function(r){return r.email.trim();}).length;
  if (tot) tot.textContent = v.length + ' rows · ' + withEmail + ' with email';
  if (!v.length) { tb.innerHTML = '<tr><td colspan="4" class="norows">No results</td></tr>'; return; }
  tb.innerHTML = v.map(function(r) {
    var idx = r._idx;
    var noem = !r.email.trim();
    var rowCls = '';
    var partContent = '<td style="font-size:12px;color:#888">' + esc(r.part) + '</td>';
    if (r.part === 'Bucuresti') {
      var el = checkEligibility(r.email, r.name);
      if (el.eligible === true) {
        rowCls = ' class="row-eligible"';
        partContent = '<td style="font-size:12px">✓ ' + esc(el.reason) + '</td>';
      } else if (el.eligible === false) {
        rowCls = ' class="row-ineligible"';
        partContent = '<td style="font-size:12px">✗ ' + esc(el.reason) + '</td>';
      } else {
        partContent = '<td style="font-size:12px;color:#888">' + esc(el.reason) + '</td>';
      }
    }
    return '<tr' + rowCls + '>' +
      '<td>' + esc(r.name) + '</td>' +
      '<td' + (noem?' class="no-email"':'') + '>' + (noem ? '—' : esc(r.email)) + '</td>' +
      partContent +
      '<td class="tc"><button class="dupbtn" onclick="dupRow(' + idx + ')" title="Add as new">+</button><button class="delbtn" onclick="delRow(' + idx + ')" title="Delete">✕</button></td>' +
      '</tr>';
  }).join('');
}

async function delRow(idx) {
  var r = rows[idx];
  rows.splice(idx, 1);
  render();
  try {
    await fetch(PROXY + '?action=csv_delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: r.name, email: r.email, part: r.part })
    });
  } catch(e) { sy('Delete sync error: ' + e.message); }
}

async function dupRow(idx) {
  var r = rows[idx];
  var name = r.name, email = r.email;
  var part = activePart !== 'All' ? activePart : r.part;
  rows.push({ name: name, email: email, part: part });
  render();
  sy('Saving…');
  try {
    var resp = await fetch(PROXY + '?action=csv_append', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, part: part })
    });
    var data = await resp.json();
    if (data.ok) { sy('Saved ✓'); setTimeout(function(){sy('');}, 2000); }
    else { sy('Save error: ' + (data.error || 'unknown')); }
  } catch(e) { sy('Save error: ' + e.message); }
}

function toggleAddForm() {
  var f = document.getElementById('addForm');
  if (f.style.display === 'none' || !f.style.display) {
    f.style.display = 'flex';
    document.getElementById('afName').focus();
  } else {
    cancelAdd();
  }
}
function cancelAdd() {
  document.getElementById('addForm').style.display = 'none';
  document.getElementById('afName').value = '';
  document.getElementById('afEmail').value = '';
}
async function saveAdd() {
  var name  = document.getElementById('afName').value.trim();
  var email = document.getElementById('afEmail').value.trim();
  if (!name) { alert('Name is required'); return; }
  var part = activePart !== 'All' ? activePart : 'Bucuresti';
  rows.push({ name: name, email: email, part: part });
  cancelAdd();
  render();
  sy('Saving…');
  try {
    var resp = await fetch(PROXY + '?action=csv_append', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, part: part })
    });
    var data = await resp.json();
    if (data.ok) { sy('Saved ✓'); setTimeout(function(){sy('');}, 2000); }
    else { sy('Save error: ' + (data.error || 'unknown')); }
  } catch(e) { sy('Save error: ' + e.message); }
}

function copyAllEmails() {
  var emails = visible()
    .map(function(r) { return r.email.trim(); })
    .filter(Boolean);
  if (!emails.length) { sy('No emails'); setTimeout(function(){sy('');}, 2000); return; }
  navigator.clipboard.writeText(emails.join(';')).then(function() {
    sy('Copied ' + emails.length + ' emails ✓');
    setTimeout(function(){sy('');}, 2500);
  });
}

function copyGreenEmails() {
  var emails = rows
    .filter(function(r) { return r.part === 'Bucuresti' && r.email.trim() && checkEligibility(r.email, r.name).eligible === true; })
    .map(function(r) { return r.email.trim(); });
  if (!emails.length) { sy('No green emails'); setTimeout(function(){sy('');}, 2000); return; }
  navigator.clipboard.writeText(emails.join(';')).then(function() {
    sy('Copied ' + emails.length + ' green emails ✓');
    setTimeout(function(){sy('');}, 2500);
  });
}

function adminLogout() {
  sessionStorage.removeItem('adminAuth');
  window.location.href = /^\/app(\/|$)/.test(location.pathname) ? '/app/' : '/';
}

/* Parse CSV */
function parseCSV(text) {
  var lines = text.split('\n');
  var result = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    /* split on comma but respect 3 columns only */
    var idx1 = line.indexOf(',');
    if (idx1 < 0) continue;
    var idx2 = line.indexOf(',', idx1 + 1);
    var name, email, part;
    if (idx2 < 0) {
      name  = line.substring(0, idx1);
      email = line.substring(idx1 + 1);
      part  = '';
    } else {
      name  = line.substring(0, idx1);
      email = line.substring(idx1 + 1, idx2);
      part  = line.substring(idx2 + 1);
    }
    if (name) result.push({ name: name, email: email, part: part });
  }
  return result;
}

async function load() {
  sy('Loading…');
  try {
    var csvPath = location.pathname.replace(/\/[^\/]*$/, '/') + 'mm_initiation.csv';
    var resp = await fetch(csvPath + '?v=' + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    var text = await resp.text();
    rows = parseCSV(text);
    buildEmailSets();
    sy('');
    render();
  } catch(e) {
    sy('Failed to load CSV: ' + e.message);
    rows = [];
    render();
  }
}

load();
</script>
</body>
</html>
