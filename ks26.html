<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KS 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080f1a;color:#c0d8ec;font-family:system-ui,-apple-system,sans-serif;padding:14px;font-size:14px}
.nav-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.nav-title{font-size:17px;font-weight:700;color:#5ab0e0;margin-right:auto;letter-spacing:.02em}
.nav-sub{font-size:12px;color:#2a5a7a;margin-left:2px}
.btn{background:#0d1e30;color:#5ab0e0;border:1px solid #1e4a6a;border-radius:6px;padding:5px 14px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit}
.btn:hover{border-color:#5ab0e0;background:#0d2a40}
.tab-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tab{background:#0d1e30;color:#5ab0e0;border:1px solid #1e4a6a;border-radius:6px;padding:5px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tab.on{background:#0a3a5a;border-color:#5ab0e0;color:#d0ecff}
.stat-line{font-size:13px;color:#3a6a8a}
.stat-line b{color:#5ab0e0}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.si{flex:1;background:#080f1a;color:#c0d8ec;border:1px solid #1e4a6a;border-radius:4px;padding:5px 10px;font-size:13px;outline:none;font-family:inherit;min-width:100px}
.si:focus{border-color:#5ab0e0}
table{width:100%;border-collapse:collapse}
thead tr{background:#0a2a42}
th{color:#5ab0e0;padding:8px 10px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;border-bottom:1px solid #1e4a6a}
td{padding:7px 10px;border-bottom:1px solid #0d1e30;vertical-align:middle}
tbody tr:hover td{background:#0d1e30}
.tx{display:inline-block;padding:2px 9px;border-radius:4px;font-size:12px;font-weight:700}
.tx-840{background:#0f2a1a;color:#5ec87a}
.tx-1050{background:#1a2a0f;color:#a0c850}
.tx-630{background:#122a12;color:#7ec850}
.tx-505{background:#122218;color:#60b870}
.tx-G{background:#1a1230;color:#a07ed0}
.tx-P{background:#2a1e00;color:#e0a040}
.tx-e{color:#333;font-size:12px}
.note-cell{color:#4a7a8a;font-size:12px}
.num{color:#1a4a6a;font-size:12px;text-align:right;width:34px}
#sy{height:20px;color:#5ab0e0;font-size:13px;margin-bottom:8px}
.add-section{margin-bottom:10px;border-bottom:1px solid #1e4a6a;padding-bottom:10px;display:none}
.add-section.open{display:block}
td[data-field]{cursor:pointer}
td[data-field]:hover{background:#0d2a40}
.add-section h3{color:#5ab0e0;font-size:13px;font-weight:600;margin-bottom:8px}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.add-row input,.add-row select{background:#080f1a;color:#c0d8ec;border:1px solid #1e4a6a;border-radius:4px;padding:5px 9px;font-size:13px;outline:none;font-family:inherit}
.add-row input:focus,.add-row select:focus{border-color:#5ab0e0}
select option{background:#0d1e30}
.rudra-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:flex-start;justify-content:center;padding-top:60px}
.rudra-overlay.open{display:flex}
.rudra-modal{background:#0d1220;border:1px solid #4a2a7a;border-radius:10px;width:min(700px,95vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.rudra-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #3a1a5a;flex-shrink:0}
.rudra-modal-body{overflow-y:auto;padding:14px 16px}
.rudra-close{background:none;border:none;color:#6a3a9a;font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.rudra-close:hover{color:#c07ae0}
</style>
</head>
<body>

<div class="nav-bar">
  <span class="nav-title">⛰ KS 2026</span>
  <span class="nav-sub">Kashmir Shaivism Retreat</span>
  <button class="btn" onclick="location.href='yoga.html'">← Admin</button>
</div>

<div id="sy"></div>

<div class="tab-bar">
  <button class="tab on" id="tabL" onclick="setTab('live')">Live <span id="cntL"></span></button>
  <button class="tab" id="tabR" onclick="setTab('replay')">Replay <span id="cntR"></span></button>
  <span class="stat-line" id="statLine"></span>
  <button class="btn" onclick="copyPaid()" style="margin-left:auto">Copy paid emails</button>
  <button class="btn" id="btnRudra" onclick="toggleRudra()" style="background:#1a0a2e;border-color:#6a3a9a;color:#c07ae0">📿 Rudra <span id="rudraCount" style="color:#a07ae0"></span></button>
</div>

<div class="add-section" id="addSection">
  <h3>Add subscriber</h3>
  <div class="add-row">
    <input id="aN" placeholder="Name" style="width:180px">
    <input id="aE" placeholder="Email" style="width:200px">
    <select id="aT">
      <option value="505">505 RON</option>
      <option value="840">840 RON (early bird)</option>
      <option value="1050">1050 RON (regular)</option>
      <option value="630">630 RON</option>
      <option value="G">G (gratis)</option>
      <option value="pending">pending</option>
      <option value="">— unpaid</option>
    </select>
    <select id="aS">
      <option value="live">live</option>
      <option value="replay">replay</option>
    </select>
    <input id="aNote" placeholder="Notes" style="width:160px">
    <button class="btn" onclick="addRow()">Save</button>
  </div>
</div>

<button class="btn" onclick="toggleAdd()" id="btnAdd" style="margin-bottom:10px">+ Add subscriber</button>

<div class="search-row">
  <input class="si" id="sN" placeholder="Name…" oninput="render()">
  <input class="si" id="sE" placeholder="Email…" oninput="render()">
</div>

<table id="mainTable">
  <thead>
    <tr>
      <th class="num">#</th>
      <th>Name</th>
      <th>Email</th>
      <th>Tax</th>
      <th>Notes</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div id="rudraSection" class="rudra-overlay" onclick="if(event.target===this)toggleRudra()">
  <div class="rudra-modal">
    <div class="rudra-modal-head">
      <span style="color:#c07ae0;font-size:14px;font-weight:700">📿 Rudra Initiation — Subscribers</span>
      <button class="rudra-close" onclick="toggleRudra()">✕</button>
    </div>
    <div class="rudra-modal-body">
      <table>
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="rudraTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var PROXY = /^\/app(\/|$)/.test(location.pathname)
  ? location.origin + '/app/airtable-proxy.php'
  : location.origin + '/airtable-proxy.php';

if (!sessionStorage.getItem('adminAuth')) {
  window.location.href = /^\/app(\/|$)/.test(location.pathname) ? '/app/' : '/';
}

var data = [], tab = 'live';

function sy(m) { document.getElementById('sy').textContent = m; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function txBadge(t) {
  t = (t||'').trim();
  if (t === '505')                       return '<span class="tx tx-505">505 RON</span>';
  if (t === '840')                       return '<span class="tx tx-840">840 RON</span>';
  if (t === '1050')                      return '<span class="tx tx-1050">1050 RON</span>';
  if (t === '630')                       return '<span class="tx tx-630">630 RON</span>';
  if (t === 'G')                         return '<span class="tx tx-G">G</span>';
  if (t.toLowerCase() === 'pending')     return '<span class="tx tx-P">pending</span>';
  if (!t)                                return '<span class="tx-e">—</span>';
  return '<span class="tx tx-P">' + esc(t) + '</span>';
}

function isPaid(t) { t=(t||'').trim(); return t==='505'||t==='840'||t==='1050'||t==='630'||t==='G'; }

function setTab(t) {
  tab = t;
  document.getElementById('tabL').className = 'tab' + (t==='live'  ? ' on' : '');
  document.getElementById('tabR').className = 'tab' + (t==='replay'? ' on' : '');
  render();
}

function render() {
  var sn = document.getElementById('sN').value.trim().toLowerCase();
  var se = document.getElementById('sE').value.trim().toLowerCase();
  var cur = data.filter(function(r){ return r.session === tab; });
  var vis = cur.filter(function(r){
    if (sn && r.name.toLowerCase().indexOf(sn)  < 0) return false;
    if (se && r.email.toLowerCase().indexOf(se) < 0) return false;
    return true;
  });
  var lc = data.filter(function(r){ return r.session==='live';   }).length;
  var rc = data.filter(function(r){ return r.session==='replay'; }).length;
  document.getElementById('cntL').textContent = lc ? '('+lc+')' : '';
  document.getElementById('cntR').textContent = rc ? '('+rc+')' : '';

  var paid = cur.filter(function(r){ return isPaid(r.tax); }).length;
  var pend = cur.filter(function(r){ return (r.tax||'').trim().toLowerCase()==='pending'; }).length;
  var unp  = cur.filter(function(r){ return !(r.tax||'').trim(); }).length;
  var sl   = 'Total: <b>'+cur.length+'</b> &nbsp; Paid/Gratis: <b>'+paid+'</b>';
  if (pend) sl += ' &nbsp; Pending: <b>'+pend+'</b>';
  if (unp)  sl += ' &nbsp; Unpaid: <b>'+unp+'</b>';
  document.getElementById('statLine').innerHTML = sl;

  var html = '';
  vis.forEach(function(r, i) {
    var idx = data.indexOf(r);
    html += '<tr data-idx="'+idx+'"><td class="num">'+(i+1)+'</td>'
          + '<td data-field="name">'+esc(r.name)+'</td>'
          + '<td data-field="email" style="opacity:.8;font-size:13px">'+esc(r.email)+'</td>'
          + '<td data-field="tax">'+txBadge(r.tax)+'</td>'
          + '<td data-field="notes" class="note-cell">'+esc(r.notes)+'</td></tr>';
  });
  document.getElementById('tbody').innerHTML = html ||
    '<tr><td colspan="5" style="text-align:center;padding:20px;color:#1a4a6a">No results</td></tr>';
}

function copyPaid() {
  var emails = data
    .filter(function(r){ return r.session===tab && isPaid(r.tax); })
    .map(function(r){ return r.email.trim(); })
    .filter(Boolean).join(';');
  if (!emails) { sy('No paid emails for this session'); return; }
  navigator.clipboard.writeText(emails).then(function(){
    sy('Copied ' + emails.split(';').length + ' emails');
    setTimeout(function(){ sy(''); }, 3000);
  });
}

function toggleAdd() {
  var open = document.getElementById('addSection').classList.toggle('open');
  document.getElementById('btnAdd').textContent = open ? '✕ Cancel' : '+ Add subscriber';
}

async function addRow() {
  var name    = document.getElementById('aN').value.trim();
  var email   = document.getElementById('aE').value.trim();
  var tax     = document.getElementById('aT').value;
  var session = document.getElementById('aS').value;
  var notes   = document.getElementById('aNote').value.trim();
  if (!name && !email) { sy('Name or email required'); return; }
  try {
    var res = await fetch(PROXY+'?action=ks26_append', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name,email,tax,session,notes})
    });
    var j = await res.json();
    if (j.error) { sy('Error: '+j.error); return; }
    data.push({name,email,tax,session,notes});
    document.getElementById('aN').value = '';
    document.getElementById('aE').value = '';
    document.getElementById('aNote').value = '';
    document.getElementById('addSection').classList.remove('open');
    document.getElementById('btnAdd').textContent = '+ Add subscriber';
    setTab(session);
    sy('Added: '+name);
    setTimeout(function(){ sy(''); }, 3000);
  } catch(e) { sy('Error: '+e.message); }
}

async function load() {
  sy('Loading…');
  try {
    var res = await fetch(PROXY+'?action=ks26_read');
    var j   = await res.json();
    if (j.error) { sy('Error: '+j.error); return; }
    data = j.rows || [];
    sy('');
    render();
  } catch(e) { sy('Load failed: '+e.message); }
}

var TAX_OPTS = ['505','840','1050','630','G','pending',''];

function makeEditable(td, r, field) {
  if (td.querySelector('input,select')) return;
  var origEmail = r.email;
  var oldVal = r[field];
  var el;
  if (field === 'tax') {
    el = document.createElement('select');
    TAX_OPTS.forEach(function(v) {
      var o = document.createElement('option');
      o.value = v; o.textContent = v || '— unpaid';
      if (v === oldVal) o.selected = true;
      el.appendChild(o);
    });
  } else {
    el = document.createElement('input');
    el.type = 'text';
    el.value = oldVal;
    el.style.width = field === 'notes' ? '200px' : field === 'email' ? '180px' : '140px';
  }
  el.style.cssText += ';background:#080f1a;color:#c0d8ec;border:1px solid #5ab0e0;border-radius:3px;padding:2px 6px;font-size:13px;font-family:inherit';
  td.innerHTML = '';
  td.appendChild(el);
  el.focus();
  if (el.select) el.select();

  function save() {
    var newVal = el.value;
    if (newVal === oldVal) { render(); return; }
    r[field] = newVal;
    render();
    fetch(PROXY + '?action=ks26_edit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        orig_email: origEmail,
        name: r.name, email: r.email, tax: r.tax,
        session: r.session, notes: r.notes
      })
    }).then(function(res){ return res.json(); }).then(function(j){
      if (j.error) { sy('Save error: ' + j.error); r[field] = oldVal; render(); }
    }).catch(function(e){ sy('Save error: '+e.message); r[field] = oldVal; render(); });
  }

  el.addEventListener('blur', save);
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { el.blur(); }
    if (e.key === 'Escape') { r[field] = oldVal; render(); }
  });
}

document.getElementById('tbody').addEventListener('click', function(e) {
  var td = e.target.closest('td[data-field]');
  if (!td) return;
  var tr = td.closest('tr[data-idx]');
  if (!tr) return;
  var r = data[parseInt(tr.getAttribute('data-idx'))];
  if (r) makeEditable(td, r, td.getAttribute('data-field'));
});

var rudraData = null, rudraOpen = false;

function parseCSV(text) {
  var rows = [], lines = text.replace(/\r/g,'').split('\n');
  if (!lines.length) return rows;
  function splitLine(line) {
    var cols = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur);
    return cols.map(function(s){ return s.trim(); });
  }
  var headers = splitLine(lines[0]);
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = splitLine(lines[i]);
    var obj = {};
    headers.forEach(function(h, j){ obj[h] = vals[j] || ''; });
    rows.push(obj);
  }
  return rows;
}

function renderRudra() {
  if (!rudraData) return;
  var html = '';
  rudraData.forEach(function(r, i) {
    var name  = r.Name  || r.name  || '';
    var email = r.Email || r.email || '';
    var notes = r.Notes || r.notes || '';
    html += '<tr>'
          + '<td class="num">'+(i+1)+'</td>'
          + '<td>'+esc(name)+'</td>'
          + '<td style="opacity:.8;font-size:13px">'+esc(email)+'</td>'
          + '<td class="note-cell">'+esc(notes)+'</td>'
          + '</tr>';
  });
  document.getElementById('rudraTbody').innerHTML = html ||
    '<tr><td colspan="4" style="text-align:center;padding:20px;color:#3a1a5a">No subscribers yet</td></tr>';
  document.getElementById('rudraCount').textContent = rudraData.length ? '('+rudraData.length+')' : '';
}

async function toggleRudra() {
  rudraOpen = !rudraOpen;
  document.getElementById('rudraSection').classList.toggle('open', rudraOpen);
  var btn = document.getElementById('btnRudra');
  btn.style.background = rudraOpen ? '#2a1040' : '#1a0a2e';
  btn.style.borderColor = rudraOpen ? '#9a50d0' : '#6a3a9a';
  if (rudraOpen && !rudraData) {
    sy('Loading Rudra list…');
    try {
      var res = await fetch('rudra_initiation.csv?_=' + Date.now());
      var text = await res.text();
      rudraData = parseCSV(text);
      renderRudra();
      sy('');
    } catch(e) { sy('Error loading CSV: '+e.message); }
  }
}

load();
</script>
</body>
</html>
