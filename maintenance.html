<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintenance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#1a1a1a;color:#d4a017;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{text-align:center;padding:40px 32px;border:1px solid #3a2e00;border-radius:12px;background:#1e1a0e;max-width:420px;width:90%}
.icon{font-size:48px;margin-bottom:20px;display:block}
h1{font-size:22px;font-weight:600;color:#f0c030;margin-bottom:12px}
p{font-size:15px;color:#888;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <span class="icon">🔧</span>
  <h1>Under Maintenance</h1>
  <p>This page is temporarily unavailable.<br>Please check back shortly.</p>
</div>
</body>
</html>
